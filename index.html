<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today I Learned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-badge">✦ learning log</div>
      <h1>Today I Learned</h1>
      <p class="subtitle">A running log of things I'm picking up along the way.</p>
    </div>
  </header>

  <main>
    <section class="add-entry">
      <h2><span class="section-icon">+</span> New Entry</h2>
      <input type="text" id="topic" placeholder="Topic (e.g. Git, VS Code, Claude)" />
      <textarea id="note" placeholder="What did you learn?"></textarea>
      <button onclick="addEntry()">Save Entry →</button>
    </section>

    <section class="entries">
      <h2><span class="section-icon">◎</span> My Entries</h2>
      <div id="entry-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
