<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https: data:; media-src 'self' https:; frame-src https://open.spotify.com; connect-src 'self' https://dfbjgoyaujlbwrptzoxs.supabase.co https://accounts.spotify.com https://api.spotify.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <title>Today I Learned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <header>
    <div class="auth-widget" id="auth-widget"></div>
    <div class="header-inner">
      <div class="header-badge">✦ AI learning log</div>
      <h1>Today I Learned</h1>
      <p class="subtitle">A running log of things I'm learning with AI and the tunes I'm listening to along the way.</p>
    </div>
  </header>

  <div id="login-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>Sign in</h3>
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') submitLogin()" />
      <div id="login-error" class="login-error" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
        <button class="btn-save" onclick="submitLogin()">Sign in</button>
      </div>
      <button class="btn-forgot" onclick="requestPasswordReset()">Forgot password?</button>
    </div>
  </div>

  <div id="reset-password-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>Set a new password</h3>
      <input type="password" id="reset-password" placeholder="New password" autocomplete="new-password" onkeydown="if(event.key==='Enter') submitNewPassword()" />
      <div id="reset-error" class="login-error" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn-save" onclick="submitNewPassword()">Save password</button>
      </div>
    </div>
  </div>

  <main>
    <section class="add-entry owner-only" id="add-entry-section">
      <h2><span class="section-icon">+</span> New Entry</h2>
      <input type="text" id="topic" placeholder="Topic (e.g. Git, VS Code, Claude)" />
      <textarea id="note" placeholder="What did you learn?"></textarea>
      <div class="spotify-row">
        <button id="spotify-connect-btn" class="btn-spotify-connect" onclick="loginSpotify()">Connect Spotify</button>
        <div id="track-search-area" style="display:none">
          <div class="track-search-wrap">
            <input id="add-track-search" type="text" placeholder="♫  What are you listening to?" oninput="onTrackSearch(event,'add')" autocomplete="off" />
            <div id="add-track-dropdown" class="track-dropdown"></div>
          </div>
          <div id="add-selected-track"></div>
        </div>
      </div>
      <button onclick="addEntry()">Save Entry →</button>
    </section>

    <section class="entries">
      <h2><span class="section-icon">◎</span> My Entries</h2>
      <div id="entry-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
